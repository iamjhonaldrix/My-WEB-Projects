<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Terminal</title>

<style>
body {
  margin: 0;
  background: #0b0f14;
  font-family: "Courier New", monospace;
  color: #4c8eff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.window {
  width: 750px;
  height: 500px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #1f2a33;
  box-shadow: 0 0 30px rgba(0,255,120,0.15);
}

.titlebar {
  background: #111820;
  padding: 10px;
  display: flex;
  justify-content: center;
  color: #fff;
  font-size: 13px;
}

.terminal {
  background: rgba(10, 15, 20, 0.95);
  padding: 15px;
  min-height: 300px;
}

#output {
  margin-bottom: 10px;
}

.line {
  margin-bottom: 2px;
}

.prompt-text {
  color: #4c8eff;
}

.input-text {
  color: #ffffff;
}

.success { color: #4cff88; }
.error { color: #ff4d4d; }
.info { color: #ffffff; }

.input-line {
  display: flex;
  align-items: center;
}

.prompt {
  margin-right: 8px;
}

.input-wrapper {
  position: relative;
  flex: 1;
}

#cmdInput {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #ffffff;
  font-family: inherit;
  position: relative;
  z-index: 2;
}

#hint {
  position: absolute;
  left: 0;
  top: 0;
  color: #7d91b3;
  pointer-events: none;
  z-index: 1;
}

.dir { color: #4da6ff; }
.exec { color: #4cff88; }
.link { color: #00ffff; }
.archive { color: #ff4d4d; }
.image { color: #ff4dff; }
.device { background: yellow; color: black; }
.file { color: #ffffff; }
.clickable { color: #00ffff;}

.link-item {
  text-decoration: none;
  cursor: pointer;
  color: orange;
}

.link-item:hover {
  text-decoration: underline;
  opacity: 0.8;
}

</style>
</head>

<body>

<div class="window">

  <div class="titlebar">
    <span>b3rl1n@kali</span>
  </div>

  <div class="terminal">
    <div id="output"></div>

    <div class="input-line">
      <span class="prompt" id="prompt">(b3rl1n㉿kali)-[~]</span>

      <div class="input-wrapper">
        <span id="hint">type help</span>
        <input id="cmdInput" autofocus />
      </div>
    </div>
  </div>

</div>

<script>
const input = document.getElementById("cmdInput");
const output = document.getElementById("output");
const prompt = document.getElementById("prompt");
const hint = document.getElementById("hint");

let pathArray = [];

const fs = {
  "~": [
    { name: "Projects", type: "dir" },
    { name: "CTF", type: "dir" },
  ],

  "~/Projects": [
    { name: "Web", type: "dir" },
  ],

    "~/Projects/Web": [
        { name: "Portfolio", type: "file", url: "https://myportfolio-zeta-navy.vercel.app" },
        { name: "Raine", type: "file", url: "https://iamjhonaldrix.github.io/My-WEB-Projects/Raine" },
        { name: "Calculator", type: "file", url: "https://iamjhonaldrix.github.io/My-WEB-Projects/Calculator" }
    ],

  "~/CTF": [
  ]
};

function getPath() {
  return "~" + (pathArray.length ? "/" + pathArray.join("/") : "");
}

input.addEventListener("input", () => {
  hint.style.display = input.value ? "none" : "block";
});

input.addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    const currentPath = getPath();

    output.innerHTML += `
      <div class="line">
        <span class="prompt-text">(b3rl1n㉿kali)-[${currentPath}]</span>
        <span class="input-text"> ${cmd}</span>
      </div>
    `;

    if (cmd === "pwd") {
      output.innerHTML += `<div class="success">${currentPath}</div>`;
    }

    else if (cmd === "ls") {
    const content = fs[currentPath];

    if (content) {
        const formatted = content.map(item => {
        if (item.url) {
            return `<a href="${item.url}" target="_blank" class="${item.type} link-item">${item.name}</a>`;
        }
        return `<span class="${item.type}">${item.name}</span>`;
        }).join("  ");

        output.innerHTML += `<div>${formatted}</div>`;
    } else {
        output.innerHTML += `<div class="info">empty directory</div>`;
    }
    }

    else if (cmd === "cl") {
      output.innerHTML = "";
    }

    else if (cmd.startsWith("cd ")) {
      const target = cmd.replace("cd ", "").trim();

      if (target === "..") {
        pathArray.pop();
      } else {
        const newPath = "~" + "/" + [...pathArray, target].join("/");
        if (fs[newPath]) {
          pathArray.push(target);
        } else {
          output.innerHTML += `<div class="error">no such directory</div>`;
        }
      }

      prompt.innerText = `(b3rl1n㉿kali)-[${getPath()}] `;
    }
    else if (cmd === "help" || cmd === "h") {
      output.innerHTML += `
        <div class="info">
        Available commands:<br />
        ls - list files<br />
        cd - change directory<br />
        pwd - show path<br />
        clear - clear terminal<br />
        help - show commands<br /><br />

        Available Colors:<br />
        Blue - Directories <br />
        Green - Executable <br />
        Red - Archive files <br />
        Magenta - Image files<br />
        Yellow BG - Device files<br />
        White - Regular / unknown files<br />
        Orange - Clickable items<br />
        </div>
      `;
    }

    else {
      output.innerHTML += `<div class="error">command not found: ${cmd}</div>`;
    }

    input.value = "";
    hint.style.display = "block";
  }
});
</script>

</body>
</html>
