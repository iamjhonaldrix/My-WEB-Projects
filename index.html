<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <main>
        <h1>Calculator Na Parang Di</h1>
        <div class="output">
            <h2 class="userInput" id="userInput"></h2>
        </div>
        <div class="buttonss">
            <div class="button-numbers">
                <div class="upper">
                    <button id="seven">7</button>
                    <button>8</button>
                    <button>9</button>
                </div>
                <div class="mid">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>
                <div class="bottom">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>
                <div class="bottom">
                    <button>0</button>
                    <button>..</button>
                    <button>.</button>
                </div>
                <div class="lower2">
                    <button id="ce">CE</button>
                    <button id="c">C</button>
                </div>
            </div>
            <div class="button-arithmetic" style="display: flex; flex-direction: column;">
                <div class="upper2">
                    <button>x</button>
                    <button>-</button>
                    <button>/</button>
                    <button>+</button>
                    <button id="equal">=</button>
                </div>
            </div>
            <div class="last-buttons">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
